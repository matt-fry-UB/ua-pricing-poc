<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Urban Air — Pricing Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Nunito+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Design tokens ── */
    :root {
      --black:   #111218;
      --yellow:  #FFD100;
      --bg:      #F5F4F0;
      --white:   #FFFFFF;
      --g100:    #F3F4F6;
      --g200:    #E5E7EB;
      --g300:    #D1D5DB;
      --g400:    #9CA3AF;
      --g500:    #6B7280;
      --g700:    #374151;
      --g900:    #111827;

      --c-ticket:   #1D4ED8;
      --c-bundle:   #7C3AED;
      --c-member:   #B45309;
      --c-annual:   #047857;
      --c-birthday: #C2410C;
      --c-merch:    #374151;
      --c-cafe:     #B91C1C;

      --font-h: 'Oswald', sans-serif;
      --font-b: 'Nunito Sans', sans-serif;
      --rad:    12px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 2px 8px rgba(0,0,0,.07);
      --shadow-md: 0 4px 16px rgba(0,0,0,.10);
    }

    body {
      font-family: var(--font-b);
      background: var(--bg);
      color: var(--g900);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Sticky header ── */
    .hdr {
      position: sticky; top: 0; z-index: 100;
      background: var(--black);
      border-bottom: 3px solid var(--yellow);
      padding: 11px 24px;
      display: flex; align-items: center; gap: 18px;
    }
    .hdr-brand { display: flex; align-items: center; gap: 11px; flex-shrink: 0; }
    .hdr-name {
      font-family: var(--font-h);
      font-size: 21px; font-weight: 700;
      letter-spacing: .07em; text-transform: uppercase; color: var(--white);
    }
    .hdr-tag {
      font-size: 10px; font-weight: 600; letter-spacing: .12em;
      text-transform: uppercase; color: var(--yellow); opacity: .8;
    }
    .hdr-sel-wrap { flex: 1; max-width: 440px; position: relative; }
    .hdr-sel {
      width: 100%; padding: 9px 34px 9px 13px;
      background: rgba(255,255,255,.08);
      border: 1.5px solid rgba(255,255,255,.18);
      border-radius: 8px;
      color: white; font-family: var(--font-b); font-size: 14px; font-weight: 600;
      appearance: none; cursor: pointer;
      transition: border-color .18s, background .18s;
    }
    .hdr-sel:focus { outline: none; border-color: var(--yellow); background: rgba(255,255,255,.13); }
    .hdr-sel option { background: #1a1a24; color: white; }
    .sel-arrow {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,.45); pointer-events: none;
    }

    /* ── States ── */
    .state {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; padding: 80px 24px; text-align: center;
    }
    .state.on { display: flex; }
    .state-icon { font-size: 44px; margin-bottom: 14px; opacity: .4; }
    .state-title {
      font-family: var(--font-h); font-size: 22px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .06em; color: var(--g700);
    }
    .state-sub { font-size: 13px; color: var(--g400); margin-top: 5px; }
    .spinner {
      width: 42px; height: 42px; border-radius: 50%;
      border: 4px solid var(--g200); border-top-color: var(--black);
      animation: spin .75s linear infinite; margin-bottom: 18px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .load-step {
      font-size: 12px; font-weight: 600; letter-spacing: .05em;
      color: var(--g400); margin-top: 7px;
    }

    /* ── Main ── */
    .main {
      display: none; flex-direction: column; gap: 36px;
      max-width: 1280px; margin: 0 auto; padding: 32px 24px 80px;
    }
    .main.on {
      display: flex;
      animation: rise .35s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes rise { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:none} }

    /* ── Section ── */
    .sec { display: none; }
    .sec.on { display: block; }
    .sec-head {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 22px;
      border-radius: var(--rad) var(--rad) 0 0;
      color: white;
    }
    .sec-head-icon { width: 20px; height: 20px; flex-shrink: 0; opacity: .9; }
    .sec-title {
      font-family: var(--font-h); font-size: 20px; font-weight: 600;
      letter-spacing: .07em; text-transform: uppercase;
    }
    .sec-body {
      background: var(--white);
      border: 1px solid var(--g200); border-top: none;
      border-radius: 0 0 var(--rad) var(--rad);
      padding: 24px;
    }

    /* ── 3-column grid (pure CSS — no @apply) ── */
    .grid3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }
    @media (max-width: 900px) { .grid3 { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px) { .grid3 { grid-template-columns: 1fr; } }

    /* ── Product card ── */
    .card {
      background: var(--white);
      border: 1px solid var(--g200);
      border-radius: var(--rad);
      overflow: hidden;
      display: flex; flex-direction: column;
      box-shadow: var(--shadow);
      transition: transform .18s, box-shadow .18s;
      animation: fadein .25s ease both;
    }
    .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    @keyframes fadein { from{opacity:0} to{opacity:1} }
    .card-bar { height: 4px; }
    .card-img { width: 100%; height: auto; display: block; }
    .card-body { padding: 16px 18px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .card-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .card-name {
      font-family: var(--font-h); font-size: 16px; font-weight: 600;
      letter-spacing: .03em; text-transform: uppercase; color: var(--g900); line-height: 1.2;
    }
    .card-price-wrap { flex-shrink: 0; text-align: right; }
    .card-price {
      font-family: var(--font-h); font-size: 22px; font-weight: 700; white-space: nowrap;
    }
    .card-price-sub {
      font-size: 10px; font-weight: 600; color: var(--g400); letter-spacing: .05em; margin-top: 1px;
    }
    .card-badge {
      display: inline-flex; align-items: center; padding: 2px 9px;
      border-radius: 100px; font-size: 10px; font-weight: 700;
      letter-spacing: .07em; text-transform: uppercase; width: fit-content;
    }
    .card-desc { font-size: 12px; color: var(--g500); line-height: 1.55; flex: 1; }
    .attracts-head {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .12em; color: var(--g400); margin-top: 10px; margin-bottom: 4px;
    }
    .attracts-list { list-style: none; display: flex; flex-direction: column; gap: 3px; }
    .attracts-list li { font-size: 11px; color: var(--g500); display: flex; align-items: baseline; gap: 4px; }
    .attracts-list li::before { content: '\2013'; color: var(--g300); flex-shrink: 0; }
    .hr-note { font-size: 10px; color: var(--g400); margin-top: 9px; line-height: 1.5; }
    /* Height requirement tooltip superscripts */
    sup.hr {
      font-size: 9px; font-weight: 700; color: #B45309;
      cursor: default; vertical-align: super; line-height: 0;
      margin-left: 1px; position: relative;
    }
    sup.hr::after {
      content: attr(data-tip);
      position: absolute; bottom: calc(100% + 5px); left: 50%; transform: translateX(-50%);
      background: #1f2937; color: white; font-size: 10px; font-weight: 400;
      padding: 6px 10px; border-radius: 6px; white-space: nowrap;
      pointer-events: none; opacity: 0; transition: opacity .12s; z-index: 50;
    }
    sup.hr:hover::after { opacity: 1; }

    /* ── Birthday packages ── */
    .bday-card {
      border-radius: var(--rad); overflow: hidden;
      border: 1px solid var(--g200); box-shadow: var(--shadow);
      background: var(--white);
      animation: fadein .25s ease both;
      transition: transform .18s, box-shadow .18s;
    }
    .bday-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .bday-head { padding: 20px 22px 16px; color: white; }
    .bday-tier {
      font-family: var(--font-h); font-size: 26px; font-weight: 700;
      letter-spacing: .05em; text-transform: uppercase;
    }
    .bday-price { font-family: var(--font-h); font-size: 36px; font-weight: 700; margin-top: 2px; }
    .bday-from { font-size: 11px; font-weight: 600; opacity: .7; letter-spacing: .05em; margin-top: -3px; }
    .bday-body { padding: 18px 22px; }
    .bday-meta {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--g400); margin-bottom: 12px;
    }
    .bday-desc { font-size: 12px; color: var(--g500); line-height: 1.55; }

    /* ── Secondary ticket row (Parent / Shorty) ── */
    .ticket-secondary {
      display: flex; flex-direction: column; gap: 8px; margin-top: 12px;
    }
    .ticket-secondary-card {
      background: var(--white); border: 1px solid var(--g200); border-radius: 8px;
      padding: 13px 18px; display: flex; align-items: center;
      justify-content: space-between; gap: 14px;
      box-shadow: var(--shadow); animation: fadein .2s ease both;
    }
    .ticket-secondary-left { display: flex; flex-direction: column; gap: 3px; }
    .ticket-secondary-name {
      font-family: var(--font-h); font-size: 15px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .03em; color: var(--g900);
    }
    .ticket-secondary-desc { font-size: 11px; color: var(--g500); }

    /* ── Hangouts ── */
    .hangouts-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .12em; color: var(--g400);
      margin: 28px 0 12px; padding-top: 24px; border-top: 1px solid var(--g100);
    }
    /* Hangouts: all on one row, wrap if > 4 */
    .hangouts-row {
      display: flex; flex-wrap: wrap; gap: 14px;
    }
    .hangouts-row .hgout {
      flex: 1 1 calc(25% - 11px); min-width: 180px;
    }
    .hgout {
      padding: 16px 18px; border-radius: var(--rad);
      border: 1px solid var(--g200); background: var(--white);
      animation: fadein .25s ease both;
    }
    .hgout-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .hgout-name {
      font-family: var(--font-h); font-size: 17px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .hgout-price { font-family: var(--font-h); font-size: 18px; font-weight: 700; }
    .amenity-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .amenity-list li { font-size: 11px; color: var(--g500); display: flex; gap: 5px; }
    .amenity-list li::before { content: '\2713'; color: #16a34a; font-weight: 700; flex-shrink: 0; }

    /* ── Simple row card (merch / café) ── */
    .row-card {
      background: var(--white); border: 1px solid var(--g200); border-radius: 8px;
      padding: 14px 18px; display: flex; align-items: center;
      justify-content: space-between; gap: 12px;
      box-shadow: var(--shadow); animation: fadein .2s ease both;
    }
    .row-card-name { font-size: 13px; font-weight: 600; color: var(--g900); }
    .row-card-price {
      font-family: var(--font-h); font-size: 17px; font-weight: 700;
      white-space: nowrap; flex-shrink: 0;
    }

    /* ── Café load button ── */
    .cafe-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 11px 22px; border: none; border-radius: var(--rad); cursor: pointer;
      background: var(--c-cafe); color: white;
      font-family: var(--font-h); font-size: 15px; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase;
      transition: background .18s, transform .15s;
    }
    .cafe-btn:hover { background: #991b1b; transform: translateY(-1px); }
    .cafe-btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    /* ── Error box ── */
    .err-box {
      max-width: 440px; margin: 60px auto; padding: 24px;
      background: #fef2f2; border: 1px solid #fca5a5; border-radius: var(--rad);
      text-align: center; display: none;
    }
    .err-box.on { display: block; }
    .err-box h3 { font-family: var(--font-h); color: #991b1b; font-size: 18px; margin-bottom: 5px; }
    .err-box p  { font-size: 13px; color: #dc2626; }

    /* ── Utility ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header class="hdr">
  <div class="hdr-brand">
    <div>
      <div class="hdr-name">Urban Air</div>
      <div class="hdr-tag">Pricing Explorer</div>
    </div>
  </div>

  <div class="hdr-sel-wrap">
    <select id="sel" class="hdr-sel">
      <option value="" disabled selected>Loading locations…</option>
    </select>
    <svg class="sel-arrow" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/>
    </svg>
  </div>

</header>

<!-- ── Empty state ── -->
<div id="empty" class="state on">
  <div class="state-icon">📍</div>
  <div class="state-title">Select a Location</div>
  <div class="state-sub">All pricing pulled live from the Urban Air API</div>
</div>

<!-- ── Loading state ── -->
<div id="loading" class="state">
  <div class="spinner"></div>
  <div class="state-title">Loading Pricing</div>
  <div id="loadStep" class="load-step">&nbsp;</div>
</div>

<!-- ── Error ── -->
<div id="errBox" class="err-box">
  <h3>Could Not Load Data</h3>
  <p id="errMsg"></p>
</div>

<!-- ── Content ── -->
<main id="content" class="main">

  <!-- Tickets -->
  <section id="ticketSec" class="sec">
    <div class="sec-head" style="background:var(--c-ticket)">
      <svg class="sec-head-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/>
      </svg>
      <span class="sec-title">Day Passes &amp; Tickets</span>
    </div>
    <div class="sec-body">
      <div id="ticketGrid" class="grid3"></div>
      <div id="ticketSecondary" class="ticket-secondary hidden"></div>
    </div>
  </section>

  <!-- Bundles -->
  <section id="bundleSec" class="sec">
    <div class="sec-head" style="background:var(--c-bundle)">
      <svg class="sec-head-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
      </svg>
      <span class="sec-title">Deals &amp; Bundles</span>
    </div>
    <div class="sec-body">
      <div id="bundleGrid" class="grid3"></div>
    </div>
  </section>

  <!-- Memberships -->
  <section id="memberSec" class="sec">
    <div class="sec-head" style="background:var(--c-member)">
      <svg class="sec-head-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <span class="sec-title">Monthly Memberships</span>
    </div>
    <div class="sec-body">
      <div id="memberGrid" class="grid3"></div>
    </div>
  </section>

  <!-- Annual -->
  <section id="annualSec" class="sec">
    <div class="sec-head" style="background:var(--c-annual)">
      <svg class="sec-head-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
      <span class="sec-title">Annual &amp; Prepaid Passes</span>
    </div>
    <div class="sec-body">
      <div id="annualGrid" class="grid3"></div>
    </div>
  </section>

  <!-- Birthdays -->
  <section id="bdaySec" class="sec">
    <div class="sec-head" style="background:var(--c-birthday)">
      <svg class="sec-head-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <!-- Party hat: cone + pom-pom + brim -->
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 2L4 20h16L12 2z"/>
        <path stroke-linecap="round" stroke-width="2" d="M4 20h16"/>
        <path stroke-linecap="round" stroke-width="1.5" d="M8.5 13.5h7M9.5 17h5"/>
        <circle cx="12" cy="2" r="1.5" fill="currentColor" stroke="none"/>
      </svg>
      <span class="sec-title">Birthday Parties</span>
    </div>
    <div class="sec-body">
      <div id="bdayGrid" class="grid3"></div>
      <div id="hangoutsSub" class="hidden">
        <div class="hangouts-label">Hangouts</div>
        <div id="hangoutsGrid" class="hangouts-row"></div>
      </div>
    </div>
  </section>

  <!-- Merchandise -->
  <section id="merchSec" class="sec">
    <div class="sec-head" style="background:var(--c-merch)">
      <svg class="sec-head-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
      </svg>
      <span class="sec-title">Add-ons &amp; Merchandise</span>
    </div>
    <div class="sec-body">
      <div id="merchGrid" class="grid3"></div>
    </div>
  </section>

  <!-- Café -->
  <section id="cafeSec" class="sec">
    <div class="sec-head" style="background:var(--c-cafe)">
      <svg class="sec-head-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
      </svg>
      <span class="sec-title">Café Menu</span>
    </div>
    <div class="sec-body">
      <button id="cafeBtn" class="cafe-btn">
        <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
        Load Café Menu
      </button>
      <div id="cafeGrid" class="grid3 hidden" style="margin-top:20px"></div>
    </div>
  </section>

</main>

<script>
/* ─── Config ─── */
const API      = 'https://unleashedapi.urbanairparks.com';
const BRAND_ID = 1;
const CACHE    = {};

const C = {
  ticket:   '#1D4ED8',
  bundle:   '#7C3AED',
  member:   '#B45309',
  annual:   '#047857',
  birthday: '#C2410C',
  merch:    '#374151',
  cafe:     '#B91C1C',
};

/* ─── DOM helpers ─── */
const $       = id => document.getElementById(id);
const showEl  = id => { const e=$(id); if(e){e.classList.remove('hidden'); e.classList.add('on');} };
const hideEl  = id => { const e=$(id); if(e){e.classList.add('hidden'); e.classList.remove('on');} };
const showSec = id => { const e=$(id); if(e) e.classList.add('on'); };
const hideSec = id => { const e=$(id); if(e) e.classList.remove('on'); };
const usd     = n  => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(n);

/* ─── Height requirement annotations ─── */
function attractionHTML(attractions) {
  if (!attractions?.length) return '';
  const fnMap = {}, fns = [];
  const rows = attractions.map(a => {
    let sup = '';
    if (a.heightRequirement) {
      if (!fnMap[a.heightRequirement]) { fns.push(a.heightRequirement); fnMap[a.heightRequirement] = fns.length; }
      sup = `<sup class="hr" data-tip="${a.heightRequirement}&quot; height req">${fnMap[a.heightRequirement]}</sup>`;
    }
    return `<li>${a.name}${sup}</li>`;
  }).join('');
  const notes = fns.length
    ? `<p class="hr-note">${fns.map((h,i)=>`<sup style="font-weight:700;color:#B45309">${i+1}</sup>&thinsp;${h}" height required`).join('&ensp;&middot;&ensp;')}</p>`
    : '';
  return `<div class="attracts-head">Included Attractions</div><ul class="attracts-list">${rows}</ul>${notes}`;
}

/* ─── Card builders ─── */
function ticketCard(p, color) {
  return `
<div class="card">
  <div class="card-bar" style="background:${color}"></div>
  <div class="card-body">
    <div class="card-row">
      <div class="card-name">${p.parkProductName}</div>
      <div class="card-price-wrap">
        <div class="card-price" style="color:${color}">${usd(p.price)}</div>
      </div>
    </div>
    ${p.description ? `<div class="card-desc">${p.description}</div>` : ''}
    ${attractionHTML(p.attractions)}
  </div>
</div>`;
}

function memberCard(p) {
  const c  = p.color || C.member;
  const iv = p.billingInterval || 'mo';
  return `
<div class="card">
  <div class="card-bar" style="background:${c}"></div>
  ${p.imageUri ? `<img class="card-img" src="${p.imageUri}" alt="${p.parkProductName}" loading="lazy" onerror="this.style.display='none'"/>` : ''}
  <div class="card-body">
    <div class="card-row">
      <div class="card-name">${p.parkProductName}</div>
      <div class="card-price-wrap">
        <div class="card-price" style="color:${c}">${usd(p.price)}<span style="font-size:11px;font-weight:600;opacity:.55"> /${iv}</span></div>
        ${p.contractDuration ? `<div class="card-price-sub">${p.contractDuration}-month contract</div>` : ''}
      </div>
    </div>
    ${p.productLevelName ? `<div class="card-badge" style="background:${c}18;color:${c}">${p.productLevelName}</div>` : ''}
    ${p.description ? `<div class="card-desc">${p.description}</div>` : ''}
    ${attractionHTML(p.attractions)}
  </div>
</div>`;
}

function annualCard(p) {
  return `
<div class="card">
  <div class="card-bar" style="background:${C.annual}"></div>
  <div class="card-body">
    <div class="card-row">
      <div class="card-name">${p.parkProductName}</div>
      <div class="card-price" style="color:${C.annual}">${usd(p.price)}</div>
    </div>
    ${p.productLevelName ? `<div class="card-badge" style="background:${C.annual}18;color:${C.annual}">${p.productLevelName}</div>` : ''}
    ${p.description ? `<div class="card-desc">${p.description}</div>` : ''}
    ${attractionHTML(p.attractions)}
  </div>
</div>`;
}

function bdayCard(pkg) {
  const c = pkg.productLevelColor || C.birthday;
  return `
<div class="bday-card">
  <div class="bday-head" style="background:${c}">
    <div class="bday-tier">${pkg.productLevelName}</div>
    <div class="bday-price">${usd(pkg.minCombinedPrice)}</div>
    <div class="bday-from">Starting price</div>
  </div>
  <div class="bday-body">
    <div class="bday-meta">
      <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
          d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      Min ${pkg.quantity} guests
    </div>
    <div class="bday-desc">${pkg.productLevelDescription || ''}</div>
    ${attractionHTML(pkg.attractions)}
  </div>
</div>`;
}

function hangoutCard(h) {
  const free = h.price === 0;
  const c    = free ? C.annual : C.birthday;
  const priceHTML = free
    ? `<span style="color:#16a34a;font-family:var(--font-h);font-size:18px;font-weight:700">Included</span>`
    : `<span class="hgout-price" style="color:${c}">+${usd(h.price)}</span>`;
  const amenities = (h.amenities || []).map(a => `<li>${a}</li>`).join('');
  return `
<div class="hgout" style="border-top:3px solid ${c}">
  <div class="hgout-row">
    <div class="hgout-name" style="color:${c}">${h.name}</div>
    ${priceHTML}
  </div>
  ${amenities ? `<ul class="amenity-list">${amenities}</ul>` : ''}
</div>`;
}

function simpleCard(p, color) {
  return `
<div class="row-card">
  <div class="row-card-name">${p.parkProductName}</div>
  <div class="row-card-price" style="color:${color}">${usd(p.price)}</div>
</div>`;
}

/* ─── API ─── */
async function apiFetch(url, signal) {
  const res = await fetch(url, signal ? { signal } : {});
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return (await res.json()).data || [];
}

/* ─── Calendar: Promise.any races 7 days, resolves on FIRST hit ─── */
async function findLimitId(parkId) {
  $('loadStep').textContent = 'Scanning upcoming schedule…';
  const makeDate = i => {
    const d = new Date();
    d.setDate(d.getDate() + i);
    return d.toISOString().slice(0, 10);
  };
  const controllers = Array.from({ length: 7 }, () => new AbortController());

  try {
    const result = await Promise.any(
      Array.from({ length: 7 }, (_, i) => {
        const ds = makeDate(i);
        return fetch(
          `${API}/brands/${BRAND_ID}/parks/${parkId}/products/calendar?date=${ds}`,
          { signal: controllers[i].signal }
        )
          .then(r => r.json())
          .then(j => {
            const slots = j.data || [];
            if (!slots.length) throw new Error('empty');
            // Cancel remaining in-flight requests immediately
            controllers.forEach((c, idx) => { if (idx !== i) c.abort(); });
            return { limitId: slots[0].parkAttendanceLimitId, date: ds };
          });
      })
    );
    return result;
  } catch {
    return { limitId: null, date: null };
  }
}

/* ─── Load park data ─── */
async function loadPark(park) {
  const { id: parkId } = park;
  if (CACHE[parkId]) return CACHE[parkId];

  const dt7    = (() => { const d = new Date(); d.setDate(d.getDate()+7); return d.toISOString().slice(0,10); })();
  const dt7ISO = dt7 + 'T12:00:00';

  $('loadStep').textContent = 'Fetching memberships, packages & schedule…';

  // Pipeline: calendar lookup kicks off immediately; tickets chain off it
  // so they start the moment limitId resolves, without waiting for the rest.
  const limitIdP = findLimitId(parkId);
  const ticketsP = limitIdP.then(({ limitId }) => {
    $('loadStep').textContent = limitId ? 'Loading day passes…' : 'No upcoming schedule found';
    return limitId
      ? apiFetch(`${API}/brands/${BRAND_ID}/parks/${parkId}/products?productTypeIds=2&parkAttendanceLimitId=${limitId}`)
      : [];
  });

  const [memberships, annualPasses, merch, pkgs, hangoutsRaw, { limitId }, allTicketProducts] =
    await Promise.all([
      apiFetch(`${API}/brands/${BRAND_ID}/parks/${parkId}/products?productTypeIds=1`),
      apiFetch(`${API}/brands/${BRAND_ID}/parks/${parkId}/products?productTypeIds=7`),
      apiFetch(`${API}/brands/${BRAND_ID}/parks/${parkId}/products?productTypeIds=3`),
      apiFetch(`${API}/bookings/packages?parkId=${parkId}&preferredDate=${dt7}&requiresHandicap=false`),
      apiFetch(`${API}/bookings/hangouts/hangouts-minimum?parkId=${parkId}&productLevelId=4&selectedDate=${dt7ISO}&requiresHandicap=false`),
      limitIdP,
      ticketsP,
    ]);

  const tickets = allTicketProducts.filter(p => p.productTypeId === 2);
  const bundles = allTicketProducts.filter(p => p.productTypeId === 11);
  // Deduplicate hangouts by resourceTypeId
  const hangouts = Object.values(
    hangoutsRaw.reduce((acc, h) => { if (!acc[h.resourceTypeId]) acc[h.resourceTypeId] = h; return acc; }, {})
  );

  const data = { parkId, tickets, bundles, memberships, annualPasses, merch, packages: pkgs, hangouts };
  CACHE[parkId] = data;
  return data;
}

/* ─── Render ─── */
function renderGrid(secId, gridId, items, cardFn) {
  if (!items?.length) { hideSec(secId); return; }
  $(gridId).innerHTML = items.map(cardFn).join('');
  showSec(secId);
}

/* ─── Determine secondary (parent / shorty) tickets ─── */
const isSecondaryTicket = name => /\b(parent|shorty)\b/i.test(name);

function secondaryTicketCard(p, color) {
  const attracts = attractionHTML(p.attractions);
  return `
<div class="ticket-secondary-card">
  <div class="ticket-secondary-left">
    <div class="ticket-secondary-name">${p.parkProductName}</div>
    ${p.description ? `<div class="ticket-secondary-desc">${p.description}</div>` : ''}
    ${attracts}
  </div>
  <div class="card-price" style="color:${color};font-size:20px">${usd(p.price)}</div>
</div>`;
}

function render({ parkId, tickets, bundles, memberships, annualPasses, merch, packages, hangouts }) {
  // Split tickets: primary grid + secondary (parent/shorty) flat row
  const primaryTickets   = tickets.filter(p => !isSecondaryTicket(p.parkProductName));
  const secondaryTickets = tickets.filter(p =>  isSecondaryTicket(p.parkProductName));
  renderGrid('ticketSec', 'ticketGrid', primaryTickets, p => ticketCard(p, C.ticket));
  if (tickets.length) showSec('ticketSec'); // ensure visible even if primaryTickets is empty
  const secRow = $('ticketSecondary');
  if (secondaryTickets.length) {
    secRow.innerHTML = secondaryTickets.map(p => secondaryTicketCard(p, C.ticket)).join('');
    secRow.classList.remove('hidden');
  } else {
    secRow.classList.add('hidden');
  }
  renderGrid('bundleSec', 'bundleGrid', bundles,      p => ticketCard(p, C.bundle));
  renderGrid('memberSec', 'memberGrid', memberships,  memberCard);
  renderGrid('annualSec', 'annualGrid', annualPasses, annualCard);
  renderGrid('merchSec',  'merchGrid',  merch,        p => simpleCard(p, C.merch));

  if (packages.length) {
    $('bdayGrid').innerHTML = packages.map(bdayCard).join('');
    showSec('bdaySec');
    if (hangouts.length) {
      $('hangoutsGrid').innerHTML = hangouts.map(hangoutCard).join('');
      showEl('hangoutsSub');
    } else {
      hideEl('hangoutsSub');
    }
  } else {
    hideSec('bdaySec');
  }

  // Café: reset state then wire lazy-load
  $('cafeGrid').innerHTML = '';
  $('cafeGrid').classList.add('hidden');
  $('cafeBtn').innerHTML = `
    <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
    </svg>
    Load Café Menu`;
  $('cafeBtn').disabled = false;
  $('cafeBtn').classList.remove('hidden');
  showSec('cafeSec');

  $('cafeBtn').onclick = async () => {
    $('cafeBtn').textContent = 'Loading…';
    $('cafeBtn').disabled = true;
    try {
      const items = await apiFetch(`${API}/brands/${BRAND_ID}/parks/${parkId}/products?productTypeIds=4`);
      if (items.length) {
        $('cafeGrid').innerHTML = items.map(p => simpleCard(p, C.cafe)).join('');
        $('cafeGrid').classList.remove('hidden');
        $('cafeBtn').classList.add('hidden');
      } else {
        $('cafeBtn').textContent = 'No café items at this location';
      }
    } catch {
      $('cafeBtn').textContent = 'Failed — try again';
      $('cafeBtn').disabled = false;
    }
  };
}

/* ─── Location dropdown ─── */
$('sel').addEventListener('change', async e => {
  const park = JSON.parse(e.target.value);
  sessionStorage.setItem('ua_park', e.target.value);

  hideEl('empty');
  hideEl('errBox');
  const main = $('content');
  main.classList.remove('on');
  main.classList.add('hidden');
  showEl('loading');

  try {
    const data = await loadPark(park);
    hideEl('loading');
    render(data);
    main.classList.remove('hidden');
    void main.offsetWidth;   // force reflow so CSS animation re-fires
    main.classList.add('on');
  } catch (err) {
    hideEl('loading');
    $('errMsg').textContent = err.message;
    showEl('errBox');
  }
});

/* ─── Boot ─── */
(async () => {
  try {
    const parks = await apiFetch(`${API}/brands/${BRAND_ID}/parks`);
    parks.sort((a, b) => a.name.localeCompare(b.name));
    const sel = $('sel');
    sel.innerHTML = '<option value="" disabled selected>Select a location…</option>';
    parks.forEach(p => {
      const opt = document.createElement('option');
      opt.value = JSON.stringify({ id: p.id, name: p.name });
      opt.textContent = p.name;
      sel.appendChild(opt);
    });
    // Restore last-selected park
    const saved = sessionStorage.getItem('ua_park');
    if (saved) {
      for (const opt of sel.options) {
        if (opt.value === saved) { sel.value = saved; sel.dispatchEvent(new Event('change')); break; }
      }
    }
  } catch (err) {
    $('errMsg').textContent = 'Failed to load locations: ' + err.message;
    hideEl('empty');
    showEl('errBox');
  }
})();
</script>
